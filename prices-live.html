<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Crypto Prices</title>
</head>
<body>
  <h1>Live Crypto Prices (CoinGecko)</h1>

  <p>
    Status: <span id="status">Loading...</span><br>
    Last updated: <span id="updated-at">-</span>
  </p>

  <table border="1" cellpadding="8" cellspacing="0">
    <thead>
      <tr>
        <th>Coin</th>
        <th>Price (USD)</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Bitcoin (BTC)</td>
        <td id="btc-price">Loading...</td>
      </tr>
      <tr>
        <td>Ethereum (ETH)</td>
        <td id="eth-price">Loading...</td>
      </tr>
    </tbody>
  </table>

  <script>
    const API =
      "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_last_updated_at=true";

    let lastBtc = null;
    let lastEth = null;

    function fmtMoney(x) {
      return "$" + Number(x).toLocaleString("en-US", { maximumFractionDigits: 2 });
    }

    function fmtTime(tsMs) {
      const d = new Date(tsMs);
      return d.toLocaleString();
    }

    async function fetchPrices() {
      const statusEl = document.getElementById("status");
      statusEl.textContent = "Fetching...";

      try {
        const res = await fetch(API, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();

        const btc = data.bitcoin.usd;
        const eth = data.ethereum.usd;

        document.getElementById("btc-price").textContent = fmtMoney(btc);
        document.getElementById("eth-price").textContent = fmtMoney(eth);

        // CoinGecko가 제공하는 업데이트 타임스탬프(초 단위)
        const lastUpdatedSec = data.bitcoin.last_updated_at || data.ethereum.last_updated_at;
        const lastUpdatedMs = lastUpdatedSec ? lastUpdatedSec * 1000 : Date.now();

        document.getElementById("updated-at").textContent = fmtTime(lastUpdatedMs);

        const changed = (btc !== lastBtc) || (eth !== lastEth);
        statusEl.textContent = changed ? "Updated (price changed)" : "Updated (no price change)";

        lastBtc = btc;
        lastEth = eth;

      } catch (e) {
        statusEl.textContent = "Error: " + e.message;
      }
    }

    fetchPrices();

    // 너무 빡세게 치면 제한 걸릴 수 있어서 2초는 유지하되,
    // 실시간 느낌은 "updated-at"으로 보여주기
    setInterval(fetchPrices, 2000);
  </script>
</body>
</html>
