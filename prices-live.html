<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Crypto Prices</title>
</head>
<body>

<h1>Live Crypto Prices (Auto Refresh Every 2 Seconds)</h1>

<table border="1" cellpadding="8" cellspacing="0">
  <thead>
    <tr>
      <th>Coin</th>
      <th>Price (USD)</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>Bitcoin (BTC)</td>
      <td id="btc-price">Loading...</td>
    </tr>
    <tr>
      <td>Ethereum (ETH)</td>
      <td id="eth-price">Loading...</td>
    </tr>
  </tbody>
</table>

<script>
async function fetchPrices() {
  try {
    const response = await fetch(
      "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd"
    );

    const data = await response.json();

    document.getElementById("btc-price").innerText =
      "$" + data.bitcoin.usd;

    document.getElementById("eth-price").innerText =
      "$" + data.ethereum.usd;

  } catch (error) {
    console.error("Error fetching prices:", error);
  }
}

fetchPrices();
setInterval(fetchPrices, 2000); // 2초마다 갱신
</script>

</body>
</html>
